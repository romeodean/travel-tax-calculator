name: Keep Supabase Alive

on:
  schedule:
    # Run every 3 days at noon UTC
    - cron: '0 12 */3 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase directly
        run: |
          # Query Supabase REST API directly - no Vercel middleman
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ztomothkgmonbrijbzyd.supabase.co/rest/v1/travel_entries?select=id&limit=1" \
            -H "apikey: sb_publishable_SenP91laRwby-e1nHMfafw_sp4qTP1U" \
            -H "Authorization: Bearer sb_publishable_SenP91laRwby-e1nHMfafw_sp4qTP1U")
          echo "Response code: $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase keep-alive ping successful"
          else
            echo "::warning::Keep-alive ping returned $response"
            exit 1
          fi

      # Keep the repo "active" so GitHub doesn't disable this workflow
      # (GitHub disables scheduled workflows after 60 days of inactivity)
      - uses: actions/checkout@v4
      - name: Keep workflow alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep-alive ping [skip ci]"
          git push
